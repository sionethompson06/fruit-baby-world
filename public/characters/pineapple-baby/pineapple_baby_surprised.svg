    <ellipse cx="400" cy="180" rx="180" ry="100" fill="#A8E063"/>
    
    <!-- Body (Pineapple Shape) -->
    <ellipse cx="400" cy="600" rx="260" ry="350" fill="#F7E27E" stroke="#5A3A1E" stroke-width="8"/>
    
    <!-- Belly Diamond -->
    <rect x="365" y="650" width="70" height="70" fill="#F4C542" transform="rotate(45 400 685)"/>
    
    <!-- Eyes -->
    <circle cx='320' cy='550' r='45' fill='#4A2A1A'/>
    <circle cx='480' cy='550' r='45' fill='#4A2A1A'/>
    
    
    
    
    
    
    <!-- Mouth -->
    
    <circle cx='400' cy='620' r='20' fill='#5A3A1E'/>
    
    
    <!-- Blush -->
    <circle cx="260" cy="600" r="35" fill="#F6A9A3" opacity="0.7"/>
    <circle cx="540" cy="600" r="35" fill="#F6A9A3" opacity="0.7"/>
    
